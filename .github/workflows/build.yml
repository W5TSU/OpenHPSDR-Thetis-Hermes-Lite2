name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  SOLUTION_FILE: 'Project Files/Source/Thetis_VS2026.sln'
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "${{ env.SOLUTION_FILE }}"

      - name: Build solution
        run: |
          msbuild "${{ env.SOLUTION_FILE }}" `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:PlatformToolset=v143 `
            /p:VisualStudioVersion=17.0 `
            /m `
            /v:minimal
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thetis-HL2-installer
          path: Project Files/bin/Installers/*.msi
          if-no-files-found: warn

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thetis-HL2-binary
          path: Project Files/Bin/${{ env.BUILD_PLATFORM }}/${{ env.BUILD_CONFIGURATION }}/Thetis.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: Thetis-HL2-installer
          path: installers

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: Thetis-HL2-binary
          path: binary
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Thetis HL2 ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            installers/*.msi
            binary/Thetis.exe
          body: |
            ## Thetis for Hermes-Lite 2 ${{ github.ref_name }}

            Built from commit ${{ github.sha }}

            ### Changes
            See [ReadMe.md](https://github.com/${{ github.repository }}/blob/master/ReadMe.md) for release notes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
